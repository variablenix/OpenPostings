name: Sync Jobs Daily

on:
  schedule:
    - cron: "20 14 * * *"
  workflow_dispatch:

permissions:
  actions: write
  contents: read
  pages: write
  id-token: write

concurrency:
  group: sync-jobs-daily
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 65
    env:
      GITHUB_OWNER: ${{ github.repository_owner }}
      GITHUB_REPO: ${{ github.event.repository.name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            docs-site/package-lock.json

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Delete old Pages artifacts
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            let page = 1;
            let deleted = 0;
            while (true) {
              const response = await github.rest.actions.listArtifactsForRepo({
                owner,
                repo,
                per_page: 100,
                page
              });
              const artifacts = Array.isArray(response?.data?.artifacts) ? response.data.artifacts : [];
              if (artifacts.length === 0) break;
              for (const artifact of artifacts) {
                if (String(artifact?.name || "") !== "github-pages") continue;
                await github.rest.actions.deleteArtifact({
                  owner,
                  repo,
                  artifact_id: artifact.id
                });
                deleted += 1;
              }
              if (artifacts.length < 100) break;
              page += 1;
            }
            core.info(`Deleted ${deleted} prior 'github-pages' artifacts.`);

      - name: Install root dependencies
        run: npm ci

      - name: Prepare Lite sync database
        run: |
          if [ -f jobs.db ]; then
            cp jobs.db "$RUNNER_TEMP/openpostings-lite.db"
          else
            echo "No source DB found (jobs.db)." >&2
            exit 1
          fi

      - name: Run timed sync pass for Lite dataset
        continue-on-error: true
        env:
          PORT: 8787
          DB_PATH: ${{ runner.temp }}/openpostings-lite.db
          SYNC_WORKER_CONCURRENCY: 30
          ATS_REQUEST_QUEUE_CONCURRENCY: 1
          SYNC_INTERVAL_MS: 86400000
          LITE_SYNC_MAX_SECONDS: 3300
        run: |
          node server/index.js > "$RUNNER_TEMP/lite-server.log" 2>&1 &
          echo $! > "$RUNNER_TEMP/lite-server.pid"

          node -e "const base='http://127.0.0.1:8787/health';const deadline=Date.now()+180000;const sleep=(ms)=>new Promise((x)=>setTimeout(x,ms));const tick=async()=>{while(Date.now()<deadline){try{const r=await fetch(base,{signal:AbortSignal.timeout(20000)});if(r.ok){console.log('health ok');return true;}}catch{} await sleep(2000);} console.warn('health check timed out; continuing with best-effort flow'); return false;};tick().then(()=>process.exit(0)).catch((e)=>{console.warn(String(e?.message||e));process.exit(0);});"

          node - <<'NODE'
          const fs = require("node:fs");

          const base = "http://127.0.0.1:8787";
          const maxSeconds = Number(process.env.LITE_SYNC_MAX_SECONDS || 3300);
          const statusPath = `${process.env.RUNNER_TEMP}/lite-sync-status.json`;

          function sleep(ms) {
            return new Promise((resolve) => setTimeout(resolve, ms));
          }

          async function triggerSync() {
            try {
              const trigger = await fetch(`${base}/sync/ats`, {
                method: "POST",
                signal: AbortSignal.timeout(30000)
              });
              if (!trigger.ok) {
                console.warn(`[lite-sync] trigger failed (${trigger.status}); continuing anyway`);
                return false;
              }
              return true;
            } catch (error) {
              console.warn(`[lite-sync] trigger error: ${String(error?.message || error)}`);
              return false;
            }
          }

          (async () => {
            let triggerStarted = await triggerSync();
            const deadline = Date.now() + maxSeconds * 1000;
            let lastLogMs = 0;
            let finalStatus = null;
            let consecutiveStatusErrors = 0;
            while (true) {
              if (Date.now() >= deadline) {
                console.log("[lite-sync] reached sync time budget; continuing with partial synced data");
                break;
              }

              try {
                const response = await fetch(`${base}/sync/status`, {
                  signal: AbortSignal.timeout(30000)
                });
                if (!response.ok) {
                  throw new Error(`status failed (${response.status})`);
                }
                const payload = await response.json();
                finalStatus = payload;
                consecutiveStatusErrors = 0;

                const now = Date.now();
                if (now - lastLogMs >= 30000) {
                  const progress = payload?.progress || {};
                  const current = Number(progress?.current || 0);
                  const total = Number(progress?.total || 0);
                  const company = String(progress?.company_name || "").trim();
                  const collected = Number(progress?.total_collected || 0);
                  console.log(
                    `[lite-sync] progress ${current}/${total} collected=${collected}${company ? ` current=${company}` : ""}`
                  );
                  lastLogMs = now;
                }

                if (!triggerStarted && !payload?.running) {
                  triggerStarted = await triggerSync();
                }

                if (!payload?.running && triggerStarted) {
                  console.log("[lite-sync] sync finished within time budget");
                  break;
                }
              } catch (error) {
                consecutiveStatusErrors += 1;
                console.warn(
                  `[lite-sync] status check failed (${consecutiveStatusErrors}): ${String(error?.message || error)}`
                );
                if (consecutiveStatusErrors >= 8) {
                  console.warn("[lite-sync] too many status failures; continuing with partial synced data");
                  break;
                }
              }
              await sleep(5000);
            }

            fs.writeFileSync(statusPath, `${JSON.stringify(finalStatus || {}, null, 2)}\n`, "utf8");
          })().catch((error) => {
            console.warn(`[lite-sync] non-fatal sync step error: ${String(error?.message || error)}`);
            process.exit(0);
          });
          NODE

      - name: Build Lite chunk files
        env:
          OPENPOSTINGS_LITE_API_BASE_URL: http://127.0.0.1:8787
          OPENPOSTINGS_LITE_DB_PATH: ${{ runner.temp }}/openpostings-lite.db
          OPENPOSTINGS_LITE_OUTPUT_DIR: ${{ github.workspace }}/docs-site/static/lite-data
          OPENPOSTINGS_LITE_CHUNK_SIZE: 300
          OPENPOSTINGS_LITE_WINDOW_HOURS: 24
          OPENPOSTINGS_LITE_MAX_OUTPUT_MB: 400
        run: |
          set +e
          npm run lite:build-chunks
          BUILD_EXIT_CODE=$?
          set -e

          if [ ! -f "${GITHUB_WORKSPACE}/docs-site/static/lite-data/index.json" ]; then
            echo "Lite chunk build produced no index.json; failing run."
            exit 1
          fi

          CHUNK_COUNT=$(node -e "const fs=require('node:fs');const p='${GITHUB_WORKSPACE}/docs-site/static/lite-data/index.json';const payload=JSON.parse(fs.readFileSync(p,'utf8'));const n=Number(payload?.total_chunks||0);process.stdout.write(String(Number.isFinite(n)?n:0));")
          if [ "${CHUNK_COUNT}" -le 0 ]; then
            echo "Lite chunk build produced zero chunks; failing run."
            exit 1
          fi

          if [ "${BUILD_EXIT_CODE}" -ne 0 ]; then
            echo "Chunk command exited non-zero, but ${CHUNK_COUNT} chunk(s) exist; continuing deploy."
          fi

      - name: Stop Lite sync server
        if: always()
        run: |
          if [ -f "$RUNNER_TEMP/lite-server.pid" ]; then
            kill "$(cat "$RUNNER_TEMP/lite-server.pid")" 2>/dev/null || true
            sleep 2
            kill -9 "$(cat "$RUNNER_TEMP/lite-server.pid")" 2>/dev/null || true
          fi

      - name: Install docs dependencies
        run: npm ci
        working-directory: docs-site

      - name: Build Docusaurus site
        run: npm run build
        working-directory: docs-site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs-site/build
          retention-days: 1

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
